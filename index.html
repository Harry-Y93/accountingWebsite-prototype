<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理报表平台 - 首页</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div id="nav-placeholder"></div>

<main class="container">
  <section class="hero">
    <!-- Slogan block (3 editable lines) -->
    <div class="card hero-copy">
      <span class="kicker">AI驱动的平台 · 适用于几乎所有中小企业</span>
      <h1 class="h1">为管理者提供各种有价值的报表和报告</h1>
      <p class="sub">专业、易用、低成本</p>

      <div class="feature">
        <div>📌</div>
        <div>
          产品/服务成本核算、全面预算、差异分析、分部盈利性报告、经营/投资/融资决策、财务报表分析等功能。
        </div>
      </div>

      <div class="badges">
        <span class="badge">成本核算</span>
        <span class="badge">全面预算</span>
        <span class="badge">差异分析</span>
        <span class="badge">管理报表</span>
      </div>

      <div class="actions">
        <a class="btn primary" href="trial.html">免费试用</a>
        <a class="btn" href="product.html">查看产品</a>
      </div>
    </div>

    <!-- Video block -->
    <div class="card video-wrap">
      <div class="video-head">
        <span>视频</span>
        <span class="small">可替换为上传的视频文件</span>
      </div>
      <div class="video">
        <video controls poster="" src="assets/hero.mp4">
          placeholder
        </video>
      </div>
      <div class="section">
        <h2>公司</h2>
        <p>这里可放公司简介、资质信息或关键数据（静态示例）。</p>
        <hr class="sep" />
        <a class="btn" href="partner.html">合作</a>
      </div>
    </div>
  </section>
</main>

<div id="footer-placeholder"></div>

<script src="js/app.js"></script>
<script src="js/load.js"></script>
</body>
</html>
