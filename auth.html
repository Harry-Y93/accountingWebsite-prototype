<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>注册 / 登录</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div id="nav-placeholder"></div>

<main class="container">
  <div class="page-title">
    <h1>注册 / 登录</h1>
    <div class="hint">静态示例：实际注册登录需要后端。</div>
  </div>

  <section class="card panel">
    <div class="grid2">
      <div>
        <h2 style="margin-top:0;">登录</h2>
        <form class="form" onsubmit="event.preventDefault(); alert('登录（示例）。');">
          <div>
            <label>邮箱 / 手机号</label>
            <input required />
          </div>
          <div>
            <label>密码</label>
            <input type="password" required />
          </div>
          <button class="btn primary" type="submit">登录</button>
        </form>
      </div>

      <div>
        <h2 style="margin-top:0;">注册</h2>
        <form class="form" onsubmit="event.preventDefault(); alert('注册（示例）。');">
          <div>
            <label>公司名称</label>
            <input required />
          </div>
          <div>
            <label>邮箱</label>
            <input type="email" required />
          </div>
          <div>
            <label>设置密码</label>
            <input type="password" required />
          </div>
          <button class="btn primary" type="submit">注册</button>
        </form>
      </div>
    </div>
  </section>
</main>

<div id="footer-placeholder"></div>

<script src="js/load.js"></script>
</body>
</html>
